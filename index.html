<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            /* Сучасний м'який градієнт на фон */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .custom-card {
            border: none;
            border-radius: 1.25rem; /* Більш круглі кути */
        }
        .form-title {
            font-weight: 700;
            color: #2b2b2b;
            letter-spacing: -0.5px;
        }
        .btn-primary-custom {
            background-color: #4a90e2;
            border-color: #4a90e2;
            font-weight: 600;
        }
        .btn-primary-custom:hover {
            background-color: #357abd;
            border-color: #357abd;
        }
        .btn-outline-custom {
            border-color: #4a90e2;
            color: #4a90e2;
            font-weight: 600;
        }
        .btn-outline-custom:hover {
            background-color: #4a90e2;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center my-5">
        <div class="card custom-card shadow-lg p-4 p-md-5 w-100" style="max-width: 800px;">
            
            <div class="text-center mb-5">
                <h2 class="form-title">Створення профілю</h2>
                <p class="text-muted">Заповніть форму нижче для реєстрації</p>
            </div>

            <form action="" method="post" id="registerForm">
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="firstName" placeholder="Ім'я">
                            <label for="firstName">First Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="lastName" placeholder="Прізвище">
                            <label for="lastName">Last Name</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="email" placeholder="Email">
                            <label for="email">Email Address</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="contactNumber" placeholder="Телефон">
                            <label for="contactNumber">Contact Number</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="address" placeholder="Адреса">
                            <label for="address">Address</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="state" placeholder="Штат/Область">
                            <label for="state">State</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3 align-items-center mt-2">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="password" placeholder="Пароль">
                            <label for="password">Password</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="row g-2">
                            <div class="col-6">
                                <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-3">Save</button>
                            </div>
                            <div class="col-6">
                                <button type="button" class="btn btn-outline-custom w-100 py-3 rounded-3">Continue</button>
                            </div>
                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
